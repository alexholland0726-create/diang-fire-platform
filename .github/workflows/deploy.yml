name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.ALIYUN_PORT }}" \
            -i ~/.ssh/aliyun_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" \
            "GIT_URL=https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git bash -s" << 'EOF'
          set -e
          mkdir -p /www/diang-fire-platform
          cd /www/diang-fire-platform
          git config --global --add safe.directory /www/diang-fire-platform
          if [ ! -d .git ]; then
            git init
            git remote add origin "$GIT_URL"
          else
            git remote set-url origin "$GIT_URL"
          fi
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD
          git clean -fd -e data/ -e public/uploads/ -e .env -e .env.local
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
          npm install
          (while true; do echo "deployment heartbeat $(date)"; sleep 25; done) &
          HEARTBEAT_PID=$!
          trap 'kill $HEARTBEAT_PID >/dev/null 2>&1 || true' EXIT
          NODE_OPTIONS=--max_old_space_size=1024 npm run build -- --no-lint
          kill $HEARTBEAT_PID >/dev/null 2>&1 || true
          pm2 restart diang-fire-platform
          pm2 save
          if command -v nginx >/dev/null 2>&1 || [ -x /www/server/nginx/sbin/nginx ]; then
            NGINX_BIN="$(command -v nginx || true)"
            if [ -z "$NGINX_BIN" ] && [ -x /www/server/nginx/sbin/nginx ]; then
              NGINX_BIN="/www/server/nginx/sbin/nginx"
            fi
            EXISTING_CONF="$(grep -Rsl "server_name .*da-fire.com" /www/server/panel/vhost/nginx /etc/nginx/conf.d /etc/nginx/sites-enabled 2>/dev/null | head -n 1 || true)"
            if [ -n "$EXISTING_CONF" ]; then
              NGINX_CONF="$EXISTING_CONF"
            elif [ -d /www/server/panel/vhost/nginx ]; then
              NGINX_CONF="/www/server/panel/vhost/nginx/diang-fire-platform.conf"
            else
              NGINX_CONF="/etc/nginx/conf.d/diang-fire-platform.conf"
            fi
            cp "$NGINX_CONF" "$NGINX_CONF.bak.$(date +%Y%m%d%H%M%S)" 2>/dev/null || true
            cat > "$NGINX_CONF" <<'NGINX'
          server {
            listen 80;
            server_name da-fire.com www.da-fire.com 116.62.231.113;
            client_max_body_size 50m;

            location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
            }
          }
          NGINX
            "$NGINX_BIN" -t
            "$NGINX_BIN" -s reload
          fi
          sleep 3
          curl -fsS http://127.0.0.1:3000/zh | grep -E "装备入口|Equipment Entry"
          curl -fsS -H "Host: da-fire.com" http://127.0.0.1/zh | grep -E "装备入口|Equipment Entry"
          EOF
