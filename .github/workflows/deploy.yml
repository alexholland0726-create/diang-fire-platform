name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='data/*.json' \
            --exclude='public/uploads' \
            -czf /tmp/diang-fire-platform.tar.gz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key
          ssh-keyscan -p "${{ secrets.ALIYUN_PORT }}" "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive to server
        run: |
          scp -P "${{ secrets.ALIYUN_PORT }}" -i ~/.ssh/aliyun_key /tmp/diang-fire-platform.tar.gz "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/diang-fire-platform.tar.gz"

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.ALIYUN_PORT }}" -i ~/.ssh/aliyun_key "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" << 'EOF'
          set -e
          mkdir -p /www/diang-fire-platform
          cd /www/diang-fire-platform
          tar -xzf /tmp/diang-fire-platform.tar.gz
          npm install
          npm run build
          pm2 restart diang-fire-platform
          pm2 save
          EOF
